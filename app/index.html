<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#fffff8">
  <title>passage</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="app">
    <header>
      <h1>passage</h1>
      <p class="stats" id="stats">loading...</p>
    </header>

    <div class="input-wrap">
      <input
        class="main-input"
        id="main-input"
        type="text"
        placeholder="new trip, or search..."
        autocomplete="off"
        spellcheck="false"
      >
      <div class="input-status" id="input-status"></div>
    </div>

    <nav class="nav" id="nav" aria-label="Trip filters">
      <button class="nav-item active" data-filter="all" type="button">All</button>
      <button class="nav-item" data-filter="active" type="button">Active</button>
      <button class="nav-item" data-filter="past" type="button">Past</button>
    </nav>

    <div class="sort-row">
      <button class="sort-control" id="sort-control" type="button">recent</button>
    </div>

    <div id="trip-list"></div>
    <div class="empty-state" id="empty-state" hidden>no trips yet - write one above.</div>
  </main>

  <section class="overlay" id="trip-overlay" aria-hidden="true">
    <div class="overlay-body" id="trip-body"></div>
  </section>

  <section class="overlay" id="entry-overlay" aria-hidden="true">
    <div class="overlay-body" id="entry-body"></div>
  </section>

  <section class="overlay" id="compose-overlay" aria-hidden="true">
    <div class="overlay-body" id="compose-body"></div>
  </section>

  <section class="overlay" id="trip-form-overlay" aria-hidden="true">
    <div class="overlay-body" id="trip-form-body"></div>
  </section>

  <div class="toast" id="toast"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
