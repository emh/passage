<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#fffff8">
  <meta name="application-name" content="Passage">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Passage">
  <title>passage</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="512x512" href="./icon.png">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="app" tabindex="-1">
    <header>
      <div class="title-row">
        <h1>passage</h1>
        <div class="title-actions">
          <span class="sync-dot local" id="sync-dot" aria-label="local only" title="local only"></span>
          <button class="action-link header-link" id="link-device-btn" data-action="open-link" type="button">LINK</button>
        </div>
      </div>
      <p class="stats" id="stats">loading...</p>
      <p class="location-status" id="location-status">checking location...</p>
    </header>

    <div class="input-wrap">
      <input
        class="main-input"
        id="main-input"
        type="text"
        placeholder="new trip, or search..."
        autocomplete="off"
        spellcheck="false"
      >
      <div class="input-status" id="input-status"></div>
    </div>

    <div id="trip-list"></div>
    <div class="empty-state" id="empty-state" hidden>no trips yet - write one above.</div>
  </main>

  <section class="overlay" id="trip-overlay" aria-hidden="true">
    <div class="overlay-body" id="trip-body" tabindex="-1"></div>
  </section>

  <section class="overlay" id="entry-overlay" aria-hidden="true">
    <div class="overlay-body" id="entry-body" tabindex="-1"></div>
  </section>

  <section class="overlay" id="compose-overlay" aria-hidden="true">
    <div class="overlay-body" id="compose-body" tabindex="-1"></div>
  </section>

  <section class="overlay" id="trip-form-overlay" aria-hidden="true">
    <div class="overlay-body" id="trip-form-body" tabindex="-1"></div>
  </section>

  <section class="overlay" id="share-overlay" aria-hidden="true">
    <div class="overlay-body" id="share-body" tabindex="-1"></div>
  </section>

  <section class="overlay" id="activity-overlay" aria-hidden="true">
    <div class="overlay-body" id="activity-body" tabindex="-1"></div>
  </section>

  <section class="overlay" id="link-overlay" aria-hidden="true">
    <div class="overlay-body" id="link-body" tabindex="-1"></div>
  </section>

  <section class="overlay" id="setup-overlay" aria-hidden="true">
    <div class="overlay-body" id="setup-body" tabindex="-1"></div>
  </section>

  <div class="toast" id="toast"></div>
  <div id="confirm-root"></div>

  <script src="./version.js"></script>
  <script src="./config.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./main.js"></script>
  <script async data-id="101502386" src="//static.getclicky.com/js"></script>
</body>
</html>
